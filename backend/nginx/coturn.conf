# ─── coturn TURN Server Configuration for YAAP ────────────────────────────────
# Place at: /etc/turnserver.conf
# Start with: turnserver -c /etc/turnserver.conf
# Official docs: https://github.com/coturn/coturn/wiki/turnserver

# ─── Network ──────────────────────────────────────────────────────────────────
listening-port=3478
tls-listening-port=5349

# Replace with your server's public IP
external-ip=YOUR_SERVER_PUBLIC_IP

# Relay address range (use your private network range)
relay-ip=YOUR_SERVER_PRIVATE_IP

# ─── Authentication ───────────────────────────────────────────────────────────
# Use time-limited HMAC credentials (compatible with IceCredential.generate_for_room)
use-auth-secret
static-auth-secret=your-long-random-coturn-secret-min-32-chars

# Realm must match what clients send
realm=yaap.app

# ─── TLS (recommended for production) ────────────────────────────────────────
# cert=/etc/letsencrypt/live/turn.yaap.app/fullchain.pem
# pkey=/etc/letsencrypt/live/turn.yaap.app/privkey.pem
# cipher-list=ECDH+AESGCM:DH+AESGCM:ECDH+AES256:DH+AES256:ECDH+AES128:DH+AES:RSA+AESGCM:RSA+AES:!aNULL:!MD5:!DSS

# ─── Security ─────────────────────────────────────────────────────────────────
# Only allow relay to public IPs (blocks SSRF via TURN)
no-multicast-peers
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=100.64.0.0-100.127.255.255

# Rate limiting
user-quota=12        # max 12 simultaneous allocations per user
total-quota=1200     # max 1200 simultaneous allocations total
max-bps=1000000      # 1 Mbps per allocation

# ─── Logging ──────────────────────────────────────────────────────────────────
log-file=/var/log/turnserver.log
verbose

# ─── Performance ──────────────────────────────────────────────────────────────
no-stdout-log
proc-user=turnserver
proc-group=turnserver
