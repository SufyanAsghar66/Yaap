# ─── YAAP NGINX Configuration ─────────────────────────────────────────────────
# Handles: HTTP → HTTPS redirect, WebSocket upgrade, static files, rate limiting

upstream django {
    server web:8000;
    keepalive 32;
}

# ─── Rate limit zones ─────────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=auth:10m    rate=10r/m;   # login/signup
limit_req_zone $binary_remote_addr zone=api:10m     rate=60r/m;   # general API
limit_req_zone $binary_remote_addr zone=ws:10m      rate=5r/s;    # WebSocket handshake

# ─── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS Main Server ────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.yaap.app;

    # SSL — managed by Certbot / AWS ACM
    ssl_certificate     /etc/letsencrypt/live/api.yaap.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.yaap.app/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options            DENY always;
    add_header X-Content-Type-Options     nosniff always;
    add_header X-XSS-Protection           "1; mode=block" always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "geolocation=(), microphone=(self), camera=()" always;

    client_max_body_size 10M;   # avatar + voice sample uploads
    keepalive_timeout    65;

    # ─── Static Files ─────────────────────────────────────────────────────────
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ─── Health Check (no auth, no rate limit) ────────────────────────────────
    location /health/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
        access_log off;
    }

    # ─── Auth Endpoints (strict rate limit) ───────────────────────────────────
    location ~ ^/api/v1/auth/(signup|login|otp|google)/ {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         http://django;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ─── WebSocket Connections ────────────────────────────────────────────────
    location ~ ^/ws/ {
        limit_req zone=ws burst=10 nodelay;

        proxy_pass          http://django;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade           $http_upgrade;
        proxy_set_header    Connection        "upgrade";
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  3600s;   # 1 hour — long-lived WebSocket connections
        proxy_send_timeout  3600s;
        proxy_buffering     off;
    }


    # ─── Translation WebSocket (audio pipeline) ────────────────────────────────
    location ~ ^/ws/translate/ {
        limit_req zone=ws burst=5 nodelay;

        proxy_pass          http://django;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade           $http_upgrade;
        proxy_set_header    Connection        "upgrade";
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_buffering     off;
        # Larger buffer for audio binary frames
        proxy_buffer_size   128k;
    }

    # ─── General API ──────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass         http://django;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering    off;
    }

    # ─── API Docs (disable in prod by returning 404) ──────────────────────────
    location ~ ^/api/(schema|docs|redoc)/ {
        return 404;
    }
}
