[pytest]
DJANGO_SETTINGS_MODULE = yaap.settings_test
python_files  = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts =
    --tb=short
    --strict-markers
    -q
markers =
    unit: fast unit tests, no DB
    integration: tests that hit the DB
    slow: tests that call external services (skip in CI with -m "not slow")
