version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# YAAP Backend — Docker Compose (Development)
# Starts: Django (ASGI), Celery worker, Celery beat, Redis
# Requires: .env file (copy from .env.example)
# Usage:
#   docker compose up --build        # start everything
#   docker compose exec web python manage.py migrate
#   docker compose exec web python manage.py createsuperuser
# ─────────────────────────────────────────────────────────────────────────────

x-django-common: &django-common
  build:
    context: .
    dockerfile: Dockerfile
  env_file: .env
  volumes:
    - .:/app
    - static_volume:/app/staticfiles
    - media_volume:/app/media
  depends_on:
    redis:
      condition: service_healthy

services:

  # ─── Django ASGI Server (Daphne) ──────────────────────────────────────────
  web:
    <<: *django-common
    container_name: yaap_web
    command: >
      sh -c "
        python manage.py migrate --noinput &&
        python manage.py collectstatic --noinput &&
        daphne -b 0.0.0.0 -p 8000 yaap.asgi:application
      "
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─── Celery Worker ────────────────────────────────────────────────────────
  celery_worker:
    <<: *django-common
    container_name: yaap_celery_worker
    command: >
      celery -A yaap worker
        --loglevel=info
        --concurrency=4
        --queues=default,email,voice_training,translation
    healthcheck:
      test: ["CMD", "celery", "-A", "yaap", "inspect", "ping"]
      interval: 60s
      timeout: 20s
      retries: 3

  # ─── Celery Beat (Scheduler) ──────────────────────────────────────────────
  celery_beat:
    <<: *django-common
    container_name: yaap_celery_beat
    command: >
      celery -A yaap beat
        --loglevel=info
        --scheduler django_celery_beat.schedulers:DatabaseScheduler

  # ─── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: yaap_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-yaapredis}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── NGINX (Reverse Proxy) ────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: yaap_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      web:
        condition: service_healthy

  # ─── XTTS Inference Microservice ─────────────────────────────────────────────
  xtts_service:
    build:
      context: .
      dockerfile: microservices/xtts_service.Dockerfile
    container_name: yaap_xtts
    restart: unless-stopped
    environment:
      - PORT=8001
    ports:
      - "8001:8001"   # internal only — not exposed via NGINX
    volumes:
      - xtts_model_cache:/root/.local/share/tts
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 30s
      start_period: 120s
      retries: 3

  # ─── Whisper STT Microservice ─────────────────────────────────────────────────
  whisper_service:
    build:
      context: .
      dockerfile: microservices/whisper_service.Dockerfile
    container_name: yaap_whisper
    restart: unless-stopped
    environment:
      - PORT=8002
      - WHISPER_MODEL=large-v3
    ports:
      - "8002:8002"   # internal only
    volumes:
      - whisper_model_cache:/root/.cache/whisper
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 30s
      start_period: 120s
      retries: 3


  # ─── coturn TURN Server ───────────────────────────────────────────────────────
  coturn:
    image: coturn/coturn:4.6.2-alpine
    container_name: yaap_coturn
    restart: unless-stopped
    network_mode: host          # coturn needs direct UDP access
    volumes:
      - ./nginx/coturn.conf:/etc/turnserver.conf:ro
    command: -c /etc/turnserver.conf
    healthcheck:
      test: ["CMD", "turnutils_uclient", "-p", "3478", "127.0.0.1"]
      interval: 60s
      timeout: 10s
      retries: 3


volumes:
  redis_data:
  xtts_model_cache:
  whisper_model_cache:
  static_volume:
  media_volume:

networks:
  default:
    name: yaap_network
